<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="rathosops — backend experience to secure, automated and observable pipelines">
  <defs>
    <!-- sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="45%" stop-color="#3a0ca3"/>
      <stop offset="70%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>
    <!-- sun -->
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="35%" stop-color="#ff6bd6"/>
      <stop offset="75%" stop-color="#ff2e97"/>
      <stop offset="100%" stop-color="#bf00ff"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2e97" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2e97" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff2e97" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- mask that cuts the sun into synthwave bars -->
    <mask id="sunbars">
      <rect x="0" y="0" width="1200" height="300" fill="white"/>
      <g fill="black">
        <rect x="480" y="150" width="240" height="3"/>
        <rect x="480" y="142" width="240" height="2.5"/>
        <rect x="480" y="135" width="240" height="2"/>
        <rect x="480" y="129" width="240" height="1.6"/>
        <rect x="480" y="124" width="240" height="1.3"/>
        <rect x="480" y="120" width="240" height="1"/>
      </g>
    </mask>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="300" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#ffffff">
      <circle cx="120" cy="40" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="70" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="900" cy="35" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="80" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="1130" cy="45" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="100" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="780" cy="60" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- sun glow + sun -->
    <ellipse cx="600" cy="120" rx="180" ry="120" fill="url(#glow)"/>
    <circle cx="600" cy="120" r="70" fill="url(#sun)" mask="url(#sunbars)"/>

    <!-- horizon glow line -->
    <rect x="0" y="178" width="1200" height="2" fill="#00ffff" filter="url(#soft)"/>

    <!-- perspective grid -->
    <g stroke="url(#grid)" stroke-width="1.4">
      <!-- horizontal lines, animated to move toward viewer -->
      <g>
        <line x1="0" y1="190" x2="1200" y2="190"/>
        <line x1="0" y1="205" x2="1200" y2="205"/>
        <line x1="0" y1="224" x2="1200" y2="224"/>
        <line x1="0" y1="248" x2="1200" y2="248"/>
        <line x1="0" y1="278" x2="1200" y2="278"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 22" dur="2.6s" repeatCount="indefinite"/>
      </g>
      <!-- vanishing-point verticals -->
      <g opacity="0.8">
        <line x1="600" y1="180" x2="-200" y2="300"/>
        <line x1="600" y1="180" x2="100" y2="300"/>
        <line x1="600" y1="180" x2="320" y2="300"/>
        <line x1="600" y1="180" x2="480" y2="300"/>
        <line x1="600" y1="180" x2="600" y2="300"/>
        <line x1="600" y1="180" x2="720" y2="300"/>
        <line x1="600" y1="180" x2="880" y2="300"/>
        <line x1="600" y1="180" x2="1100" y2="300"/>
        <line x1="600" y1="180" x2="1400" y2="300"/>
      </g>
    </g>

    <!-- scanline overlay -->
    <rect x="0" y="0" width="1200" height="6" fill="#00ffff" opacity="0.07">
      <animate attributeName="y" values="-6;300" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- title -->
    <g font-family="'Press Start 2P', monospace" text-anchor="middle">
      <text x="600" y="92" font-size="44" font-weight="700" fill="#ff2e97" opacity="0.6">rathosops</text>
      <text x="603" y="90" font-size="44" font-weight="700" fill="#00ffff" opacity="0.5">rathosops</text>
      <text x="600" y="90" font-size="44" font-weight="700" fill="#ffffff">rathosops
        <animate attributeName="fill" values="#ffffff;#ff6bd6;#ffffff" dur="5s" repeatCount="indefinite"/>
      </text>
    </g>
    <text x="600" y="130" font-family="monospace" font-size="14" letter-spacing="2" text-anchor="middle" fill="#00ffff">
      &#9656; backend experience &#8594; secure, automated &amp; observable pipelines &#9666;
    </text>

    <!-- frame border -->
    <rect x="1" y="1" width="1198" height="298" rx="10" fill="none" stroke="#ff6bd6" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>
