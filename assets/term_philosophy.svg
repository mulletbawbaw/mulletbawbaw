<svg width="820" height="218" viewBox="0 0 820 218" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="$ tail -f /var/log/philosophy.log"><defs><linearGradient id="title" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6bd6"/><stop offset="100%" stop-color="#00ffff"/></linearGradient><linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6bd6"/><stop offset="50%" stop-color="#bf00ff"/><stop offset="100%" stop-color="#00ffff"/></linearGradient><linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#241046"/><stop offset="100%" stop-color="#1a0b2e"/></linearGradient></defs><rect x="0.75" y="0.75" width="818.5" height="216.5" rx="10" fill="url(#panel)" stroke="url(#frame)" stroke-width="1.5"/><rect x="0" y="0" width="820" height="2.5" fill="#00ffff" opacity="0.08"><animate attributeName="y" values="-3;218" dur="5s" repeatCount="indefinite"/></rect><circle cx="20" cy="22" r="5.5" fill="#ff2e97"/><circle cx="38" cy="22" r="5.5" fill="#bf00ff"/><circle cx="56" cy="22" r="5.5" fill="#00ffff"/><text x="410.0" y="27" font-family="'Press Start 2P', monospace" font-size="11" font-weight="400" fill="#ff6bd6" text-anchor="middle">$ tail -f /var/log/philosophy.log</text><line x1="12" y1="40" x2="808" y2="40" stroke="#bf00ff" stroke-width="1" opacity="0.35"/><g opacity="0.95"><polygon points="781.2,50.0 792.4,73.8 770.0,73.8" fill="#ffd36a" stroke="#ff2e97" stroke-width="1"/><polygon points="781.2,50.0 786.8,61.9 775.6,61.9" fill="#ffe066" opacity="0.8"/><polygon points="781.2,50.0 774.2,64.7 770.0,73.8 770.0,73.8" fill="#ff9f78" opacity="0.5"/><circle cx="779.1" cy="61.2" r="1.7" fill="#ff2e97"/><circle cx="784.0" cy="66.8" r="1.7" fill="#ff2e97"/><circle cx="777.0" cy="68.9" r="1.4" fill="#ff2e97"/></g><text x="22" y="62" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#00ffff" xml:space="preserve">[ops]       </tspan><tspan fill="#e0c3fc" xml:space="preserve">se você não tem runbook, você não tem operação — tem sorte.</tspan></text><text x="22" y="80" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#ff2e97" xml:space="preserve">[security]  </tspan><tspan fill="#e0c3fc" xml:space="preserve">o shift-left não é metodologia. é responsabilidade.</tspan></text><text x="22" y="98" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#7CFFB0" xml:space="preserve">[infra]     </tspan><tspan fill="#e0c3fc" xml:space="preserve">imutabilidade não é opcional. é higiene básica.</tspan></text><text x="22" y="116" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#ff6bd6" xml:space="preserve">[pipeline]  </tspan><tspan fill="#e0c3fc" xml:space="preserve">um deploy sem scan de imagem é um deploy de esperança.</tspan></text><text x="22" y="134" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#00ffff" xml:space="preserve">[linux]     </tspan><tspan fill="#e0c3fc" xml:space="preserve">o terminal não é uma ferramenta. é a interface real do sistema.</tspan></text><text x="22" y="152" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#ff2e97" xml:space="preserve">[devops]    </tspan><tspan fill="#e0c3fc" xml:space="preserve">DevOps não é cargo. é cultura. quem cobra o cargo, não entendeu.</tspan></text><text x="22" y="170" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#7CFFB0" xml:space="preserve">[code]      </tspan><tspan fill="#e0c3fc" xml:space="preserve">automação sem observabilidade é automação às cegas.</tspan></text><text x="22" y="188" font-family="monospace" font-size="13" xml:space="preserve"><tspan fill="#ff6bd6" xml:space="preserve">[career]    </tspan><tspan fill="#e0c3fc" xml:space="preserve">o engenheiro sênior não é quem sabe mais. é quem quebrou mais e documentou.</tspan></text></svg>
